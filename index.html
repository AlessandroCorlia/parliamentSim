<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="shortcut icon" href="logo.png" type="image/x-icon">
<link rel="stylesheet" href="css/style.css">
<title>Create your own Parliament</title>
</head>
<body>
<div id="menu">
  <h1>Gestione Partiti</h1>
  <form id="partitoForm">
    <input type="text" id="nome" placeholder="Nome partito" required>
    <label for="">Colore partito:</label>
    <input type="color" id="colore" value="#ff0000" style="cursor: pointer;">
    <select id="ideologia" required style="cursor: pointer">
      <option value="" disabled selected>Scegli ideologia</option>
      <option value="sinistra">Sinistra</option>
      <option value="centro">Centro</option>
      <option value="destra">Destra</option>
    </select>
    <input type="number" id="percentuale" placeholder="% Seggi" min="0" max="100" required>
    <button type="submit">Eleggi Partito</button>
  </form>
  <div id="legenda"></div>
  <div id="percentuale-riempimento">Riempimento parlamento: 0%</div>
</div>
<div id="main">
  <h2 id="titoloParlamento">Il Tuo Parlamento</h2>
  
  
  <!-- Finestra Leggi -->
  <div id="archivioLeggiContainer" style="
    display:none;
    position:absolute;
    top:60px;
    right:20px;
    width:320px;
    max-height:400px;
    overflow-y:auto;
    background:white;
    border:2px solid #2e4a7d;
    border-radius:12px;
    box-shadow:0 4px 16px rgba(0,0,0,0.25);
    padding:15px;
    z-index:50;
    font-family: 'Segoe UI', sans-serif;
  ">
    <h3 style="text-align:center; color:#2e4a7d; margin-bottom:10px;">Leggi Approvate</h3>
    <div id="listaLeggi" style="font-size:14px;"></div>
    <button id="chiudiArchivio" style="
      margin-top:10px;
      width:100%;
      padding:8px;
      background:#c22;
      color:#fff;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-weight:600;
    ">✖ Chiudi</button>
  </div>
  <svg id="parlamento" viewBox="0 0 800 450" preserveAspectRatio="xMidYMid meet"></svg>
  <div id="modalVoto" class="modal">
    <div class="modal-content">
      <h3 id="modalTitolo"></h3>
      <p id="modalTesto"></p>
      <button id="chiudiModal">Chiudi</button>
    </div>
  </div>
  <div id="risultatoLegge">
    <div id="risultatoBox">
      <h3>Esito della votazione</h3>
      <p id="testoRisultato"></p>
      <button id="chiudiRisultato">Chiudi</button>
    </div>
  </div>
  
  <div id="presidente"></div>
  <div id="pdcDiv"></div>
</div>
<div id="azioni">
  <h2>Azioni</h2>

  <div class="azione-blocco">
    <h4>⚖️ Gestione Parlamento</h4>
    <button id="btnVota">🗳️ Eleggi Presidente del Parlamento</button>
    <button id="btnCoalizione">🤝 Crea Coalizione</button>
    <button id="btnPdC">👤 Nomina Presidnte del Consiglio</button>
    <button id="btnReset">⚖️ Sciogli Parlamento</button>
  </div>

  <div class="azione-blocco">
    <h4>📜 Attività Legislativa</h4>
    <button id="btnLegge">📜 Proponi Disegno di Legge</button>
    <button id="btnArchivioLeggi">📚 Archivio Leggi</button>
  </div>

</div>
<!-- Form Modifica Partito -->
<div id="editFormContainer">
  <h3>Modifica Partito</h3>
  <form id="editForm">
    <input type="text" id="editNome" required>
    <input type="color" id="editColore">
    <select id="editIdeologia" required>
      <option value="sinistra">Sinistra</option>
      <option value="centro">Centro</option>
      <option value="destra">Destra</option>
    </select>
    <input type="number" id="editPercentuale" min="0" max="100" required>
    <button type="submit">Salva Modifica</button>
    <button type="button" id="editCancel">Annulla</button>
  </form>
</div>

<!-- Form Creazione Coalizione -->
<div id="coalizioneContainer">
  <h3>Forma Coalizione</h3>
  <form id="coalizioneForm"></form>
  <div id="coalTot" style="margin-top:8px;font-weight:bold"></div>
  <button id="confermaCoalizione">✅ Conferma Coalizione</button>
  <button id="annullaCoalizione" style="margin-left:8px;">✖ Annulla</button>
</div>
<div id="leggeContainer">
  <h3>Proposta di legge</h3>

  <input type="text" id="titoloLegge" placeholder="Titolo della legge">

  <select id="tipoLegge">
    <option value="" disabled selected>Seleziona tipo legge</option>
    <option value="governo">Proposta del Governo</option>
    <option value="parlamento">Proposta del Parlamento</option>
  </select>

  <div id="partitoProponenteDiv" style="display:none; margin-top:8px;">
    <select id="partitoProponente"></select>
  </div>

  <button id="inviaLegge">Invia al Parlamento</button>
  <button id="annullaLegge">Annulla</button>
</div>

<div id="risultatoLegge"></div>
<script src="js/script.js"></script>
</body>
</html>
